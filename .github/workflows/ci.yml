name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test:run

      # Migrated from "next lint" (deprecated in Next 16) to the ESLint CLI.
      # Non-blocking for now (continue-on-error) so it surfaces findings on a
      # codebase that was never gated by lint, without blocking merges. Flip to
      # blocking once the existing findings are cleared. Tracked in audit-2026-05.
      - name: ESLint
        run: npx eslint .
        continue-on-error: true
