name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test:run

      # Migrated from "next lint" (deprecated in Next 16) to the ESLint CLI.
      # Non-blocking for now (continue-on-error) so it surfaces findings on a
      # codebase that was never gated by lint, without blocking merges. Flip to
      # blocking once the existing findings are cleared. Tracked in audit-2026-05.
      - name: ESLint
        run: npx eslint .
        continue-on-error: true

  # Build the freshly-checked main and deploy to Cloudflare via OpenNext.
  # Gated on lint-and-typecheck passing; only runs on push to main (or a manual
  # dispatch). The deploy STEP is guarded on CLOUDFLARE_API_TOKEN being set, so
  # this job is safe to merge before the secrets exist — it simply skips with a
  # notice until they're added.
  #
  # Required repo secrets to enable:
  #   CLOUDFLARE_API_TOKEN          (token from the "Edit Cloudflare Workers" template)
  #   CLOUDFLARE_ACCOUNT_ID
  #   NEXT_PUBLIC_SUPABASE_URL      (build-time public env)
  #   NEXT_PUBLIC_SUPABASE_ANON_KEY (build-time public env)
  # Runtime Worker secrets (OPENAI_API_KEY, SUPABASE_SERVICE_ROLE_KEY, …) persist
  # on Cloudflare across deploys and are NOT needed here.
  deploy:
    name: Deploy (Cloudflare)
    needs: lint-and-typecheck
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Skip notice (Cloudflare secrets not configured)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice title=Deploy skipped::CLOUDFLARE_API_TOKEN is not set. Add CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY as repository secrets to enable auto-deploy."

      - name: Checkout
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci --no-audit --no-fund

      - name: Build & deploy (OpenNext -> Cloudflare)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy
