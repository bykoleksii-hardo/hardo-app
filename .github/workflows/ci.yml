name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck (informational)
        id: tsc
        continue-on-error: true
        run: npx tsc --noEmit

      - name: ESLint (informational)
        id: eslint
        continue-on-error: true
        run: npx next lint --max-warnings=0

      - name: Summary
        if: always()
        run: |
          echo "## CI summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- tsc: ${{ steps.tsc.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- eslint: ${{ steps.eslint.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Both steps are currently informational (continue-on-error)." >> "$GITHUB_STEP_SUMMARY"
          echo "They will be promoted to required after fixing existing errors." >> "$GITHUB_STEP_SUMMARY"
